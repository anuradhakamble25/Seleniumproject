<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            font-family: Arial;
            margin-top:100px;
            text-align:center;
        }

        input{
            width:220px;
            padding:8px;
            margin:10px;
        }

        button{
            padding:10px 25px;
            background-color:blue;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background-color:darkblue;
        }

        a{
            display:block;
            margin-top:20px;
            text-decoration:none;
        }
    </style>

</head>

<body>

<h2>Login Page</h2>

<input type="text"
       id="username"
       placeholder="Enter Username">

<br>

<input type="password"
       id="password"
       placeholder="Enter Password">

<br><br>

<button id="login">
    Login
</button>

<br>

<a href="#">Forgot Password</a>

</body>
</html>
