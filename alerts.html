<!DOCTYPE html>
<html>
<head>
    <title>Alert Demo</title>
</head>
<body>

<h2>Alert Practice</h2>

<!-- Simple Alert -->
<button onclick="simpleAlert()">Simple Alert</button>

<br><br>

<!-- Confirmation Alert -->
<button onclick="confirmAlert()">Confirmation Alert</button>

<br><br>

<!-- Prompt Alert -->
<button onclick="promptAlert()">Prompt Alert</button>

<script>

function simpleAlert() {
    alert("Registration Successful");
}

function confirmAlert() {
    confirm("Do you want to delete this employee?");
}

function promptAlert() {
    prompt("Enter Employee Name");
}

</script>

</body>
</html>
